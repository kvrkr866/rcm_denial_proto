name: CI

on:
  # Disabled during demo phase — enable for production
  # push:
  #   branches: [main, develop]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:   # manual trigger only

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: Lint (ruff check)
        run: ruff check src/ tests/
      - name: Format check (ruff format)
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr poppler-utils
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ --tb=short -q --cov=src/rcm_denial --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: rcm-denial:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
