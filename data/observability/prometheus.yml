# ─────────────────────────────────────────────────────────────────────────────
# Prometheus configuration for RCM Denial Management
#
# Usage:
#   prometheus --config.file=data/observability/prometheus.yml
#
# Scrape strategy for this batch-job pipeline:
#   Option A (recommended): node_exporter textfile collector
#     node_exporter reads data/metrics/rcm_denial.prom after each batch.
#     Zero runtime service required — just run the batch and scrape the file.
#
#   Option B: Pushgateway
#     The batch job pushes metrics to a Pushgateway after completion.
#     Set PROMETHEUS_PUSHGATEWAY_URL=http://localhost:9091 in .env.
#     Prometheus then scrapes the gateway continuously.
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     30s
  evaluation_interval: 30s
  external_labels:
    environment: development
    application: rcm_denial

# ── Option A: node_exporter with textfile collector ───────────────────────────
# Start node_exporter with:
#   node_exporter \
#     --collector.textfile.directory=/path/to/rcm_denial/data/metrics/ \
#     --web.listen-address=:9100

scrape_configs:

  - job_name: rcm_denial_textfile
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          job: rcm_denial
    metric_relabel_configs:
      # Only keep rcm_* metrics from node_exporter to reduce cardinality
      - source_labels: [__name__]
        regex: "rcm_.*"
        action: keep

# ── Option B: Prometheus Pushgateway ─────────────────────────────────────────
# Start Pushgateway with:
#   pushgateway --web.listen-address=:9091

  - job_name: rcm_denial_pushgateway
    honor_labels: true
    static_configs:
      - targets: ["localhost:9091"]
        labels:
          job: rcm_denial

# ── Alert rules file ─────────────────────────────────────────────────────────
rule_files:
  - "rcm_denial_alerts.yml"

