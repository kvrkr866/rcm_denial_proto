# ─────────────────────────────────────────────────────────────────────────────
# Prometheus configuration for RCM Denial Management
#
# In Docker Compose, services are referenced by container name, not localhost.
# Metrics flow: pipeline → Pushgateway → Prometheus → Grafana
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    application: rcm_denial

scrape_configs:

  # Pushgateway — receives metrics pushed after each batch
  - job_name: rcm_denial_pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
        labels:
          job: rcm_denial

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
