# ─────────────────────────────────────────────────────────────────────────────
# Promtail configuration — ships RCM Denial logs to Grafana Loki
#
# In Docker Compose: Loki is at "loki:3100", logs at /app/logs/
# ─────────────────────────────────────────────────────────────────────────────

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail_positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── RCM application logs (structlog JSON) ──────────────────────────────────
  - job_name: rcm_denial_app
    static_configs:
      - targets:
          - localhost
        labels:
          job:         rcm_denial
          environment: production
          __path__:    /app/logs/*.log

    pipeline_stages:

      # Parse the structlog JSON payload
      - json:
          expressions:
            level:      level
            event:      event
            claim_id:   claim_id
            batch_id:   batch_id
            run_id:     run_id
            payer_id:   payer_id
            node:       node
            timestamp:  timestamp

      # Promote parsed fields to Loki labels
      - labels:
          level:    ~
          batch_id: ~

      # Map structlog level names to Loki severity
      - match:
          selector: '{level="error"}'
          stages:
            - static_labels:
                severity: error
      - match:
          selector: '{level="warning"}'
          stages:
            - static_labels:
                severity: warning
      - match:
          selector: '{level="info"}'
          stages:
            - static_labels:
                severity: info

      # Extract timestamp from structlog ISO-8601
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05.999999Z07:00"
            - "2006-01-02T15:04:05Z"

  # ── Audit log JSON files (per-claim) ─────────────────────────────────────
  - job_name: rcm_denial_audit
    static_configs:
      - targets:
          - localhost
        labels:
          job:         rcm_denial_audit
          environment: production
          __path__:    /app/output/*/internal_audit/audit_log.json

# ─────────────────────────────────────────────────────────────────────────────
# Loki / Grafana query examples (LogQL):
#
#  All errors:
#    {job="rcm_denial", level="error"}
#
#  Errors for a specific batch:
#    {job="rcm_denial", batch_id="B-260416-1234-001"} |= "error"
#
#  All events for a specific claim:
#    {job="rcm_denial"} |= "CLM-33001"
#
#  Pipeline stage completions:
#    {job="rcm_denial", level="info"} |= "completed"
#
#  Write-off events:
#    {job="rcm_denial", level="warning"} |= "written off"
#
#  LLM call failures:
#    {job="rcm_denial", level="warning"} |= "LLM" |= "failed"
#
#  Audit trail for a claim:
#    {job="rcm_denial_audit"} |= "CLM-33001"
# ─────────────────────────────────────────────────────────────────────────────
