# ─────────────────────────────────────────────────────────────────────────────
# RCM Denial Management — Full Application Stack
#
# Services:
#   app           — RCM Denial Management (web UI + CLI)
#   prometheus    — metrics scraping
#   pushgateway   — receives batch metrics push
#   grafana       — dashboards
#   loki          — log aggregation
#   promtail      — ships logs to Loki
#
# Usage:
#   docker compose up -d                           # start everything
#   docker compose up -d app                       # app only (no monitoring)
#   docker compose exec app rcm-denial stats       # run CLI inside container
#
#   Web UI:    http://localhost:8080
#   Grafana:   http://localhost:3000  (admin/admin)
#   Prometheus:http://localhost:9090
#
# With PostgreSQL (production):
#   1. Uncomment the postgres service below
#   2. Set DATABASE_TYPE=postgresql in environment
#   3. Run: docker compose exec app rcm-denial db export-schema | docker compose exec -T postgres psql -U rcm -d rcm_denial
#   4. Run: docker compose exec app rcm-denial db migrate-to-postgres
#
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

networks:
  rcm_net:
    driver: bridge

volumes:
  app_data:
  prometheus_data:
  grafana_data:
  loki_data:
  # postgres_data:   # uncomment for PostgreSQL

services:

  # ── Application ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rcm_app
    restart: unless-stopped
    networks: [rcm_net]
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      # Persist output, logs, database, and metrics across restarts
      - app_data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
      # Mount .env for configuration
      - ./.env:/app/.env:ro
      # Mount SOP documents (read-only)
      - ./data/sop_documents:/app/data/sop_documents:ro
      # Mount evals golden cases
      - ./data/evals:/app/data/evals:ro
    environment:
      ENV: production
      METRICS_EXPORT_AFTER_BATCH: "true"
      PROMETHEUS_PUSHGATEWAY_URL: "http://pushgateway:9091"
    depends_on:
      - pushgateway
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── PostgreSQL (uncomment for production) ────────────────────────────
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: rcm_postgres
  #   restart: unless-stopped
  #   networks: [rcm_net]
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: rcm
  #     POSTGRES_PASSWORD: rcm_secure_password
  #     POSTGRES_DB: rcm_denial
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U rcm -d rcm_denial"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Prometheus ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rcm_prometheus
    restart: unless-stopped
    networks: [rcm_net]
    ports:
      - "9090:9090"
    volumes:
      - ./data/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Pushgateway ──────────────────────────────────────────────────────
  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: rcm_pushgateway
    restart: unless-stopped
    networks: [rcm_net]
    ports:
      - "9091:9091"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Grafana ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: rcm_grafana
    restart: unless-stopped
    networks: [rcm_net]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./data/observability/grafana_provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── Loki ─────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.5
    container_name: rcm_loki
    restart: unless-stopped
    networks: [rcm_net]
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── Promtail ─────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.5
    container_name: rcm_promtail
    restart: unless-stopped
    networks: [rcm_net]
    volumes:
      - ./data/observability/promtail_config.yaml:/etc/promtail/config.yaml:ro
      - ./logs:/app/logs:ro
      - ./output:/app/output:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
